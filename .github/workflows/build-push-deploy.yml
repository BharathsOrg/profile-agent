name: Build, Push & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-push-deploy:
    runs-on: arc-runner-set

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west2-docker.pkg.dev --quiet

      - name: Build & push image
        env:
          REGISTRY: us-west2-docker.pkg.dev/krishproject87/docker-images
        run: bash scripts/build-docker.sh

      - name: Commit updated kustomization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/local/kustomization.yaml
          if git diff --cached --quiet; then
            echo "kustomization.yaml unchanged, skipping commit"
          else
            git commit -m "ci: update image tag to $(git rev-parse --short HEAD)"
            git push
          fi

      - name: Copy secret.yaml to workspace
        run: cp /home/bharath/workspace/profile_agent/k8s/base/secret.yaml k8s/base/secret.yaml

      - name: Deploy to Kubernetes
        run: echo "y" | bash scripts/deploy-k8s.sh local
