# k8s/base/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: profile-agent-ingress
  annotations:
    # HAProxy-specific timeout annotations for SSE/streaming responses
    haproxy.org/timeout-tunnel: "600s"
    haproxy.org/timeout-http-request: "600s"
    haproxy.org/timeout-http-keep-alive: "600s"
spec:
  # HAProxy Ingress Controller (NodePort 30080) - matches all other services in the cluster
  # SSL is terminated by HAProxy on the host, so no TLS section needed here
  ingressClassName: haproxy
  rules:
  - host: profile.krishb.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: profile-agent-service
            port:
              number: 80
